# por las puras..
version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORDR}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /home/ec2-user/innovatech-project/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-net

  backend-ventas:
    image: ${AWS_ECR_REGISTRY}/innovatech-ventas:latest
    ports:
      - "8081:8081"
    user: "${CURRENT_UID}:${CURRENT_GID}"
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:${DB_PORT}/${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - front-net
      - back-net
  backend-despachos:
    image: ${AWS_ECR_REGISTRY}/innovatech-despachos:latest
    ports:
      - "8082:8082"
    user: "${CURRENT_UID}:${CURRENT_GID}"
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:${DB_PORT}/${DB_NAME_D}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME_D}
      DB_USERNAME: ${DB_USERNAME_D}
      DB_PASSWORD: ${DB_PASSWORD_D}
    depends_on:
      mysql:
        condition: service_healthy
      backend-ventas:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - front-net
      - back-net
volumes:
  mysql_data:

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge