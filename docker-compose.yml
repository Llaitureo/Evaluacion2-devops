services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    env_file:
      - ./.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST/
      dockerfile: dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    environment:
      DATASOURCE_URL: jdbc:mysql://${DB_ENDPOINT}:${DB_PORT}/${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/
      dockerfile: dockerfile
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      DATASOURCE_URL_D: jdbc:mysql://${DB_ENDPOINT}:${DB_PORT}/despachos_db
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - backend-ventas
  frontend:
    build:
      context: ./front_despacho/
      dockerfile: dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_BACKEND_VENTAS_URL: http://backend-ventas:8081/api/v1/ventas
      REACT_APP_BACKEND_DESPACHOS_URL: http://backend-despachos:8082/api/v1/despachos
      HOST: 0.0.0.0
    depends_on:
      - backend-despachos
volumes:
  mysql_data:
