spring.application.name=Springboot-API-REST-DESPACHO

spring.web.allow-cors=true

# Configuración de la base de datos MySQL en AWS RDS
spring.datasource.url=jdbc:mysql://mysql:${DB_PORT:3306}/${DB_NAME_D:innovatech_despachos_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME_D:root}
spring.datasource.password=${DB_PASSWORD_D:}
spring.sql.init.platform=mysql

# Hikari (evita caída si DB tarda en responder)
spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=60000
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.connectionTestQuery=SELECT 1

# Evita fallo si DB aún no está lista
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Configuración de Hibernate
spring.jpa.database=mysql
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html

server.port=8082
server.address=0.0.0.0